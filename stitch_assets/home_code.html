<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#e2e2e7",
                    "error": "#ba1a1a",
                    "surface-dim": "#d9dade",
                    "inverse-on-surface": "#f0f0f5",
                    "tertiary-fixed-dim": "#68d3fc",
                    "inverse-primary": "#ffb4aa",
                    "on-primary-fixed": "#410001",
                    "on-primary": "#ffffff",
                    "on-primary-fixed-variant": "#930005",
                    "on-background": "#1a1c1f",
                    "tertiary-container": "#007fa0",
                    "surface": "#f9f9fe",
                    "surface-container-low": "#f3f3f8",
                    "secondary-fixed-dim": "#c6c6cb",
                    "on-surface": "#1a1c1f",
                    "on-error": "#ffffff",
                    "surface-container-high": "#e8e8ed",
                    "on-error-container": "#93000a",
                    "secondary": "#5d5e63",
                    "on-tertiary-fixed": "#001f29",
                    "on-tertiary-fixed-variant": "#004d63",
                    "primary": "#bc000a",
                    "on-secondary-container": "#626267",
                    "error-container": "#ffdad6",
                    "secondary-fixed": "#e3e2e7",
                    "surface-container-highest": "#e2e2e7",
                    "outline": "#926f6a",
                    "surface-bright": "#f9f9fe",
                    "on-secondary-fixed-variant": "#46464b",
                    "primary-container": "#e2241f",
                    "primary-fixed": "#ffdad5",
                    "on-primary-container": "#fffbff",
                    "on-secondary-fixed": "#1a1b1f",
                    "background": "#f9f9fe",
                    "surface-container-lowest": "#ffffff",
                    "outline-variant": "#e7bdb7",
                    "on-surface-variant": "#5d3f3b",
                    "surface-container": "#ededf2",
                    "tertiary": "#00647f",
                    "tertiary-fixed": "#bbe9ff",
                    "on-tertiary": "#ffffff",
                    "primary-fixed-dim": "#ffb4aa",
                    "on-tertiary-container": "#fafdff",
                    "secondary-container": "#e0dfe4",
                    "surface-tint": "#c0000a",
                    "on-secondary": "#ffffff",
                    "inverse-surface": "#2e3034"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        }
      }
    </script>
<style>
        .chrono-dial-container {
            position: relative;
            width: 320px;
            height: 320px;
        }
        .dial-label {
            position: absolute;
            transform: translate(-50%, -50%);
            font-size: 0.875rem;
            font-weight: 600;
            color: #1a1c1f;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#f9f9fe] text-[#1a1c1f] font-['Inter'] min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="bg-[#f9f9fe] dark:bg-zinc-950 flex justify-between items-center px-6 py-4 w-full max-w-2xl mx-auto fixed top-0 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#bc000a] dark:text-[#e2241f]" data-icon="timer">timer</span>
<h1 class="text-xl font-bold tracking-tighter text-[#1a1c1f] dark:text-zinc-50">ShutTimer</h1>
</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-[#bc000a]" data-icon="notifications">notifications</span>
<span class="material-symbols-outlined text-[#1a1c1f]/60" data-icon="settings">settings</span>
</div>
</header>
<main class="w-full max-w-2xl px-6 pt-24 pb-32 flex-1 flex flex-col items-center">
<!-- The Chrono-Dial Section -->
<section class="mt-8 mb-12 flex flex-col items-center justify-center">
<div class="chrono-dial-container flex items-center justify-center">
<!-- Circular Scale Numbers -->
<!-- Positioned mathematically around the 320px container -->
<div class="dial-label top-[0%] left-[50%]">0</div>
<div class="dial-label top-[6.7%] left-[75%]">5</div>
<div class="dial-label top-[25%] left-[93.3%]">10</div>
<div class="dial-label top-[50%] left-[100%]">15</div>
<div class="dial-label top-[75%] left-[93.3%]">20</div>
<div class="dial-label top-[93.3%] left-[75%]">25</div>
<div class="dial-label top-[100%] left-[50%]">30</div>
<div class="dial-label top-[93.3%] left-[25%]">35</div>
<div class="dial-label top-[75%] left-[6.7%]">40</div>
<div class="dial-label top-[50%] left-[0%]">45</div>
<div class="dial-label top-[25%] left-[6.7%]">50</div>
<div class="dial-label top-[6.7%] left-[25%]">55</div>
<!-- The Ring -->
<div class="relative w-64 h-64 rounded-full bg-surface-container-low flex items-center justify-center overflow-hidden">
<!-- Red Time Wedge (Donut Fill) -->
<!-- In a real app, this would be an SVG or Canvas. Represented here as a visual wedge -->
<div class="absolute w-full h-full bg-[#bc000a]" style="clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 50%);"></div>
<!-- Center Hole (The Knob) -->
<div class="z-10 w-48 h-48 rounded-full bg-surface-container-lowest shadow-[0_4px_32px_rgba(26,28,31,0.06)] flex flex-col items-center justify-center">
<span class="text-5xl font-extrabold tracking-tight text-[#1a1c1f]">15:00</span>
<span class="text-sm font-medium text-secondary/60 mt-1 uppercase tracking-widest">Minutes</span>
</div>
</div>
</div>
</section>
<!-- Mission Icons Horizontal Scroll -->
<section class="w-full mb-12">
<h3 class="text-[#1a1c1f] font-bold headline-sm mb-6 text-center">CHOOSE A MISSION</h3>
<div class="flex overflow-x-auto gap-6 px-4 hide-scrollbar py-2">
<!-- Mission Cards -->
<div class="flex flex-col items-center gap-3 shrink-0">
<div class="w-16 h-16 rounded-2xl bg-surface-container-low flex items-center justify-center hover:bg-surface-container-high transition-colors cursor-pointer border-2 border-primary">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="tv">tv</span>
</div>
<span class="text-xs font-bold text-primary">TV</span>
</div>
<div class="flex flex-col items-center gap-3 shrink-0">
<div class="w-16 h-16 rounded-2xl bg-surface-container-lowest flex items-center justify-center hover:bg-surface-container-low transition-colors cursor-pointer">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="bathtub">bathtub</span>
</div>
<span class="text-xs font-medium text-secondary">Bath</span>
</div>
<div class="flex flex-col items-center gap-3 shrink-0">
<div class="w-16 h-16 rounded-2xl bg-surface-container-lowest flex items-center justify-center hover:bg-surface-container-low transition-colors cursor-pointer">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="menu_book">menu_book</span>
</div>
<span class="text-xs font-medium text-secondary">Reading</span>
</div>
<div class="flex flex-col items-center gap-3 shrink-0">
<div class="w-16 h-16 rounded-2xl bg-surface-container-lowest flex items-center justify-center hover:bg-surface-container-low transition-colors cursor-pointer">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="school">school</span>
</div>
<span class="text-xs font-medium text-secondary">Study</span>
</div>
<div class="flex flex-col items-center gap-3 shrink-0">
<div class="w-16 h-16 rounded-2xl bg-surface-container-lowest flex items-center justify-center hover:bg-surface-container-low transition-colors cursor-pointer">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="dentistry">dentistry</span>
</div>
<span class="text-xs font-medium text-secondary">Teeth</span>
</div>
<div class="flex flex-col items-center gap-3 shrink-0">
<div class="w-16 h-16 rounded-2xl bg-surface-container-lowest flex items-center justify-center hover:bg-surface-container-low transition-colors cursor-pointer">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="toys">toys</span>
</div>
<span class="text-xs font-medium text-secondary">Play</span>
</div>
<div class="flex flex-col items-center gap-3 shrink-0">
<div class="w-16 h-16 rounded-2xl bg-surface-container-lowest flex items-center justify-center hover:bg-surface-container-low transition-colors cursor-pointer">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="sports_esports">sports_esports</span>
</div>
<span class="text-xs font-medium text-secondary">Gaming</span>
</div>
<div class="flex flex-col items-center gap-3 shrink-0">
<div class="w-16 h-16 rounded-2xl bg-surface-container-lowest flex items-center justify-center hover:bg-surface-container-low transition-colors cursor-pointer">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="cooking">cooking</span>
</div>
<span class="text-xs font-medium text-secondary">Cooking</span>
</div>
</div>
</section>
<!-- Primary Action Button -->
<button class="w-full max-w-sm py-5 rounded-xl bg-primary text-on-primary font-extrabold text-xl tracking-wider active:scale-95 transition-transform">
            START
        </button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-8 pb-8 pt-4 bg-[#f9f9fe]/70 dark:bg-zinc-950/70 backdrop-blur-xl shadow-[0_-4px_32px_rgba(26,28,31,0.06)] z-50">
<div class="flex flex-col items-center justify-center text-[#bc000a] bg-[#f3f3f8] dark:bg-zinc-900 rounded-full p-3 active:scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="home">home</span>
</div>
<div class="flex flex-col items-center justify-center text-[#1a1c1f]/40 dark:text-zinc-500 p-3 hover:text-[#bc000a] transition-colors">
<span class="material-symbols-outlined" data-icon="hourglass_empty">hourglass_empty</span>
</div>
<div class="flex flex-col items-center justify-center text-[#1a1c1f]/40 dark:text-zinc-500 p-3 hover:text-[#bc000a] transition-colors">
<span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
</div>
</nav>
</body></html>
