<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ShutTimer - Running</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e2e2e7",
                        "error": "#ba1a1a",
                        "surface-dim": "#d9dade",
                        "inverse-on-surface": "#f0f0f5",
                        "tertiary-fixed-dim": "#68d3fc",
                        "inverse-primary": "#ffb4aa",
                        "on-primary-fixed": "#410001",
                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#930005",
                        "on-background": "#1a1c1f",
                        "tertiary-container": "#007fa0",
                        "surface": "#f9f9fe",
                        "surface-container-low": "#f3f3f8",
                        "secondary-fixed-dim": "#c6c6cb",
                        "on-surface": "#1a1c1f",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e8e8ed",
                        "on-error-container": "#93000a",
                        "secondary": "#5d5e63",
                        "on-tertiary-fixed": "#001f29",
                        "on-tertiary-fixed-variant": "#004d63",
                        "primary": "#bc000a",
                        "on-secondary-container": "#626267",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#e3e2e7",
                        "surface-container-highest": "#e2e2e7",
                        "outline": "#926f6a",
                        "surface-bright": "#f9f9fe",
                        "on-secondary-fixed-variant": "#46464b",
                        "primary-container": "#e2241f",
                        "primary-fixed": "#ffdad5",
                        "on-primary-container": "#fffbff",
                        "on-secondary-fixed": "#1a1b1f",
                        "background": "#f9f9fe",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#e7bdb7",
                        "on-surface-variant": "#5d3f3b",
                        "surface-container": "#ededf2",
                        "tertiary": "#00647f",
                        "tertiary-fixed": "#bbe9ff",
                        "on-tertiary": "#ffffff",
                        "primary-fixed-dim": "#ffb4aa",
                        "on-tertiary-container": "#fafdff",
                        "secondary-container": "#e0dfe4",
                        "surface-tint": "#c0000a",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2e3034"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#f9f9fe] text-[#1a1c1f] min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="bg-[#f9f9fe] dark:bg-zinc-950 docked full-width top-0 z-50 w-full">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-2xl mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#bc000a] dark:text-[#e2241f]" data-icon="timer">timer</span>
<h1 class="font-['Inter'] tracking-tighter text-xl font-bold text-[#1a1c1f] dark:text-zinc-50">ShutTimer</h1>
</div>
<button class="hover:opacity-80 transition-opacity p-2 rounded-full">
<span class="material-symbols-outlined text-[#1a1c1f]/60" data-icon="settings">settings</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center w-full max-w-2xl px-6 pb-32">
<!-- Chrono-Dial Section -->
<div class="relative w-full aspect-square max-w-[320px] sm:max-w-[400px] flex items-center justify-center mb-16">
<!-- Scale Markings (Visual Guide) -->
<div class="absolute inset-0 rounded-full border-[12px] border-surface-container"></div>
<!-- The Red Wedge (Shrinking clockwise representation) -->
<!-- We use a conic gradient to simulate the Time Timer physical disc -->
<div class="absolute inset-0 rounded-full" style="background: conic-gradient(#bc000a 0deg, #e2241f 150deg, transparent 150deg); mask-image: radial-gradient(transparent 88%, black 89%); -webkit-mask-image: radial-gradient(transparent 88%, black 89%);">
</div>
<!-- Dial Knob & Time Center -->
<div class="z-10 bg-surface-container-lowest w-4/5 h-4/5 rounded-full shadow-[0_4px_32px_rgba(26,28,31,0.06)] flex flex-col items-center justify-center text-center">
<div class="flex flex-col items-center">
<span class="text-[#1a1c1f] font-bold text-6xl sm:text-7xl tracking-tight -mb-2">24:59</span>
<span class="text-secondary font-medium tracking-widest text-xs uppercase opacity-60">minutes left</span>
</div>
</div>
<!-- Static Marks -->
<div class="absolute inset-4 pointer-events-none">
<div class="relative w-full h-full">
<div class="absolute top-0 left-1/2 -translate-x-1/2 text-secondary font-bold text-sm">60</div>
<div class="absolute right-0 top-1/2 -translate-y-1/2 text-secondary font-bold text-sm">15</div>
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 text-secondary font-bold text-sm">30</div>
<div class="absolute left-0 top-1/2 -translate-y-1/2 text-secondary font-bold text-sm">45</div>
</div>
</div>
</div>
<!-- Action Grid -->
<div class="w-full grid grid-cols-2 gap-4">
<!-- Secondary Button: Pause -->
<button class="flex flex-col items-center justify-center gap-2 p-6 rounded-xl bg-surface-container-lowest shadow-[0_4px_16px_rgba(26,28,31,0.04)] border border-transparent hover:border-[#bc000a]/20 transition-all active:scale-95 group">
<div class="w-12 h-12 rounded-full border-2 border-[#bc000a] flex items-center justify-center text-[#bc000a] group-hover:bg-[#bc000a] group-hover:text-white transition-colors">
<span class="material-symbols-outlined" data-icon="pause">pause</span>
</div>
<span class="text-[#bc000a] font-bold text-sm tracking-wide">Pause</span>
</button>
<!-- Secondary Button: Cancel -->
<button class="flex flex-col items-center justify-center gap-2 p-6 rounded-xl bg-surface-container-lowest shadow-[0_4px_16px_rgba(26,28,31,0.04)] border border-transparent hover:border-secondary/20 transition-all active:scale-95 group">
<div class="w-12 h-12 rounded-full border-2 border-secondary/40 flex items-center justify-center text-secondary group-hover:bg-secondary group-hover:text-white transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</div>
<span class="text-secondary font-bold text-sm tracking-wide">Cancel</span>
</button>
</div>
<!-- Status Card (Bento Style) -->
<div class="mt-8 w-full bg-surface-container-low rounded-xl p-6 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-lg" data-icon="notifications_active">notifications_active</span>
</div>
<div>
<p class="text-[#1a1c1f] font-semibold text-sm">End Time</p>
<p class="text-secondary text-xs">Estimated at 10:45 AM</p>
</div>
</div>
<span class="material-symbols-outlined text-secondary/40" data-icon="chevron_right">chevron_right</span>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50">
<div class="bg-[#f9f9fe]/70 dark:bg-zinc-950/70 backdrop-blur-xl shadow-[0_-4px_32px_rgba(26,28,31,0.06)]">
<div class="fixed bottom-0 left-0 w-full flex justify-around items-center px-8 pb-8 pt-4">
<a class="flex flex-col items-center justify-center text-[#1a1c1f]/40 dark:text-zinc-500 p-3 transition-colors hover:text-[#bc000a]" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#bc000a] bg-[#f3f3f8] dark:bg-zinc-900 rounded-full p-3 Active: scale-90 duration-300" href="#">
<span class="material-symbols-outlined" data-icon="hourglass_empty">hourglass_empty</span>
</a>
<a class="flex flex-col items-center justify-center text-[#1a1c1f]/40 dark:text-zinc-500 p-3 transition-colors hover:text-[#bc000a]" href="#">
<span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
</a>
</div>
</div>
</nav>
</body></html>
